<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autoresearch Pipeline — Blueprint</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --bp:#0b3a6f;            /* blueprint blue */
    --bp-deep:#072a52;
    --ink:#dfeaff;           /* drafting white-blue */
    --ink-dim:#8fb4e6;
    --accent:#ffd54a;        /* annotation amber */
    --line:rgba(150,190,255,.18);
    --line-strong:rgba(190,215,255,.55);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Share Tech Mono',monospace;
    background:
      radial-gradient(120% 100% at 50% 0%, #0e4685 0%, var(--bp) 45%, var(--bp-deep) 100%);
    color:var(--ink);
    height:100vh;width:100vw;overflow:hidden;
    position:relative;
  }
  /* drafting grid */
  body::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:
      linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line) 1px,transparent 1px),
      linear-gradient(var(--line-strong) 1px,transparent 1px),
      linear-gradient(90deg,var(--line-strong) 1px,transparent 1px);
    background-size:26px 26px,26px 26px,130px 130px,130px 130px;
    mask-image:radial-gradient(130% 110% at 50% 40%,#000 60%,transparent 100%);
  }
  body::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(140% 120% at 50% 50%,transparent 55%,rgba(0,0,0,.45) 100%);
  }

  .frame{
    position:absolute;inset:18px;
    border:1.5px solid var(--line-strong);
    z-index:2;pointer-events:none;
  }
  .frame .corner{position:absolute;width:14px;height:14px;border:1.5px solid var(--ink);}
  .corner.tl{top:-1px;left:-1px;border-right:none;border-bottom:none;}
  .corner.tr{top:-1px;right:-1px;border-left:none;border-bottom:none;}
  .corner.bl{bottom:-1px;left:-1px;border-right:none;border-top:none;}
  .corner.br{bottom:-1px;right:-1px;border-left:none;border-top:none;}

  .titleblock{
    position:absolute;right:30px;bottom:30px;z-index:5;
    border:1.5px solid var(--line-strong);
    background:rgba(7,42,82,.6);
    backdrop-filter:blur(2px);
    padding:10px 16px;font-size:11px;line-height:1.7;
    color:var(--ink-dim);letter-spacing:1px;
  }
  .titleblock b{color:var(--ink);font-family:'Special Elite',cursive;letter-spacing:.5px;}
  .titleblock .rev{color:var(--accent);}

  .stamp{
    position:absolute;left:34px;bottom:30px;z-index:5;
    font-family:'Special Elite',cursive;font-size:12px;letter-spacing:3px;
    color:var(--ink-dim);
    border:1px dashed var(--line-strong);padding:6px 12px;
    transform:rotate(-3deg);
  }

  .stage{
    position:absolute;inset:0;z-index:3;
    display:flex;align-items:center;justify-content:center;
  }
  svg{width:min(1180px,94vw);height:auto;display:block;}

  /* node label boxes drawn in HTML overlaid is messy; keep all in SVG */
  text{font-family:'Share Tech Mono',monospace;}
  .lbl{fill:var(--ink);font-size:21px;letter-spacing:1px;}
  .lbl-sm{fill:var(--ink);font-size:15px;letter-spacing:.5px;}
  .lbl-sub{fill:var(--ink-dim);font-size:11px;letter-spacing:1px;}
  .tag{fill:var(--accent);font-family:'Special Elite',cursive;font-size:13px;letter-spacing:1px;}
  .title{fill:var(--ink);font-family:'Special Elite',cursive;font-size:30px;letter-spacing:3px;}
  .title-rule{stroke:var(--accent);stroke-width:1.5;}
  .node{fill:rgba(10,52,100,.35);stroke:var(--ink);stroke-width:1.5;}
  .edge{fill:none;stroke:var(--ink);stroke-width:1.6;}
  .edge-loop{fill:none;stroke:var(--accent);stroke-width:1.6;stroke-dasharray:6 5;}
  .edge-fan{fill:none;stroke:var(--ink-dim);stroke-width:1.4;}

  /* animation */
  .draw{stroke-dasharray:1400;stroke-dashoffset:1400;animation:draw 1.2s ease forwards;}
  .draw.d1{animation-delay:.1s}.draw.d2{animation-delay:.4s}
  .draw.d3{animation-delay:.7s}.draw.d4{animation-delay:1s}
  @keyframes draw{to{stroke-dashoffset:0;}}
  .pop{opacity:0;animation:pop .5s ease forwards;}
  .p1{animation-delay:.2s}.p2{animation-delay:.5s}.p3{animation-delay:.8s}
  .p4{animation-delay:1.2s}.p5{animation-delay:1.5s}.p6{animation-delay:1.7s}.p7{animation-delay:1.9s}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .loop-flow{animation:flow 1.4s linear infinite;}
  @keyframes flow{to{stroke-dashoffset:-22;}}
</style>
</head>
<body>
  <div class="frame">
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>
  </div>

  <div class="stage">
    <svg viewBox="0 0 1180 760" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto">
          <path d="M1,1 L9,5 L1,9" fill="none" stroke="var(--ink)" stroke-width="1.6"/>
        </marker>
        <marker id="arrA" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto">
          <path d="M1,1 L9,5 L1,9" fill="none" stroke="var(--accent)" stroke-width="1.6"/>
        </marker>
        <marker id="arrD" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto">
          <path d="M1,1 L9,5 L1,9" fill="none" stroke="var(--ink-dim)" stroke-width="1.4"/>
        </marker>
      </defs>

      <!-- ===== SLIDE TITLE ===== -->
      <text class="title pop p1" x="590" y="46" text-anchor="middle">HOW PONG ACADEMY WORKS</text>
      <line class="title-rule pop p1" x1="360" y1="64" x2="820" y2="64"/>

      <!-- ===== EPISODE MEMORY (feeds Raspberry Pi) ===== -->
      <g class="pop p2">
        <rect class="node" x="490" y="100" width="200" height="60" rx="3"/>
        <text class="lbl-sm" x="590" y="130" text-anchor="middle">EPISODE MEMORY</text>
        <text class="lbl-sub" x="590" y="150" text-anchor="middle">PRIOR RUNS · CONTEXT</text>
      </g>
      <!-- connector: Episode Memory down into Raspberry Pi -->
      <path class="edge draw d2" d="M590,160 L590,196" marker-end="url(#arr)"/>

      <!-- ===== TOP ROW: CAMERA -> RASPBERRY PI -> ACTION ===== -->
      <!-- Camera -->
      <g class="pop p3">
        <rect class="node" x="60" y="200" width="200" height="64" rx="3"/>
        <text class="lbl" x="160" y="232" text-anchor="middle">CAMERA</text>
        <text class="lbl-sub" x="160" y="252" text-anchor="middle">VISION INPUT</text>
      </g>
      <!-- Raspberry Pi -->
      <g class="pop p3">
        <rect class="node" x="490" y="200" width="200" height="64" rx="3"/>
        <text class="lbl" x="590" y="232" text-anchor="middle">RASPBERRY Pi</text>
        <text class="lbl-sub" x="590" y="252" text-anchor="middle">EDGE COMPUTE</text>
      </g>
      <!-- Action -->
      <g class="pop p3">
        <rect class="node" x="920" y="200" width="200" height="64" rx="3"/>
        <text class="lbl" x="1020" y="232" text-anchor="middle">ACTION</text>
        <text class="lbl-sub" x="1020" y="252" text-anchor="middle">ACTUATION</text>
      </g>

      <!-- arrows top row -->
      <path class="edge draw d1" d="M260,232 L482,232" marker-end="url(#arr)"/>
      <path class="edge draw d2" d="M690,232 L912,232" marker-end="url(#arr)"/>

      <!-- ===== AUTORESEARCH LOOP (Action -> ... -> Camera) ===== -->
      <text class="tag pop p4" x="590" y="328" text-anchor="middle">AUTORESEARCH LOOP</text>
      <!-- loop path: down from Action, left across, up to Camera -->
      <path class="edge-loop loop-flow draw d3"
            d="M1020,264 L1020,355 L160,355 L160,268"
            marker-end="url(#arrA)"/>

      <!-- ===== MCP SERVER ===== -->
      <g class="pop p4">
        <rect class="node" x="470" y="400" width="240" height="70" rx="3"/>
        <text class="lbl" x="590" y="433" text-anchor="middle">MCP SERVER</text>
        <text class="lbl-sub" x="590" y="454" text-anchor="middle">MODEL CONTEXT PROTOCOL</text>
      </g>
      <!-- connector from loop spine down to MCP -->
      <path class="edge-fan draw d3" d="M590,355 L590,398"/>

      <!-- ===== FAN-OUT TO USE CASES ===== -->
      <path class="edge-fan draw d4" d="M520,470 L235,620" marker-end="url(#arrD)"/>
      <path class="edge-fan draw d4" d="M590,470 L590,620" marker-end="url(#arrD)"/>
      <path class="edge-fan draw d4" d="M660,470 L945,620" marker-end="url(#arrD)"/>

      <!-- Use case 1 -->
      <g class="pop p5">
        <rect class="node" x="55" y="628" width="280" height="92" rx="3"/>
        <text class="lbl-sm" x="195" y="662" text-anchor="middle">SMART HOME</text>
        <text class="lbl-sm" x="195" y="684" text-anchor="middle">APPLIANCE</text>
        <text class="lbl-sub" x="195" y="706" text-anchor="middle">PERSONALIZATION</text>
      </g>
      <!-- Use case 2 -->
      <g class="pop p6">
        <rect class="node" x="450" y="628" width="280" height="92" rx="3"/>
        <text class="lbl-sm" x="590" y="662" text-anchor="middle">ADAPTIVE SPORTS</text>
        <text class="lbl-sm" x="590" y="684" text-anchor="middle">TRAINING</text>
        <text class="lbl-sub" x="590" y="706" text-anchor="middle">MOTION COACHING</text>
      </g>
      <!-- Use case 3 -->
      <g class="pop p7">
        <rect class="node" x="845" y="628" width="280" height="92" rx="3"/>
        <text class="lbl-sm" x="985" y="662" text-anchor="middle">PRECISION</text>
        <text class="lbl-sm" x="985" y="684" text-anchor="middle">AGRICULTURE</text>
        <text class="lbl-sub" x="985" y="706" text-anchor="middle">CROP MONITORING</text>
      </g>

      <!-- section caption -->
      <text class="lbl-sub" x="590" y="752" text-anchor="middle" opacity=".7">— EDGE CASE DEPLOYMENTS —</text>
    </svg>
  </div>
</body>
</html>
